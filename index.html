<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Ejecutador de Código</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #333; color: white; padding: 10px; text-align: center; }
        .container { display: flex; flex: 1; border-top: 2px solid #555; }
        textarea { width: 50%; padding: 15px; border: none; border-right: 2px solid #555; font-family: monospace; font-size: 16px; background: #1e1e1e; color: #d4d4d4; resize: none; }
        iframe { width: 50%; border: none; background: white; }
    </style>
</head>
<body>

<header>
    <h1>🚀 Mi Visualizador de Código</h1>
</header>

<div class="container">
    <textarea id="codigo" placeholder="Escribe tu HTML aquí..."></textarea>
    
    <iframe id="resultado"></iframe>
</div>

<script>
    const areaCodigo = document.getElementById('codigo');
    const visualizador = document.getElementById('resultado');

    // Función que actualiza el iframe cada vez que escribes
    areaCodigo.addEventListener('input', () => {
        const contenido = areaCodigo.value;
        const documento = visualizador.contentDocument || visualizador.contentWindow.document;
        documento.open();
        documento.write(contenido);
        documento.close();
    });

    // Código inicial de ejemplo
    areaCodigo.value = `<h1>¡Hola Mundo!</h1>
<p>Cambia este texto y mira lo que pasa a la derecha.</p>
<style>
  h1 { color: darkblue; }
  body { background: #f0f0f0; text-align: center; padding-top: 50px; }
</style>`;
    areaCodigo.dispatchEvent(new Event('input'));
</script>

</body>
</html>
