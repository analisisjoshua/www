<!DOCTYPE html>
<html>
<head>
  <style>
    /* Estilos para que se vea moderno */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 2rem;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
    }

    button {
      background: #ff4757;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ff6b81;
    }

    #contador {
      font-size: 3rem;
      font-weight: bold;
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Contador Interactivo</h1>
    <p>Haz clic para aumentar el número:</p>
    <div id="contador">0</div>
    <button onclick="aumentar()">¡Clic aquí!</button>
  </div>

  <script>
    // Lógica sencilla en JavaScript
    let cuenta = 0;
    function aumentar() {
      cuenta++;
      document.getElementById('contador').innerText = cuenta;
      
      // Efecto sorpresa al llegar a 10
      if(cuenta === 10) {
        alert("¡Wow, 10 clics! Eres rápido.");
      }
    }
  </script>

</body>
</html>
