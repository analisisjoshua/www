<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagrama de Flujo Académico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetic Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 28px;
        }
        
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        
        .container {
            animation: slideDown 0.6s ease-out;
        }
        
        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .node:hover rect {
            filter: brightness(0.95);
            stroke-width: 1px !important;
        }
        
        .node:hover text {
            font-weight: 600;
        }
        
        /* Colores para tema claro */
        .c-blue rect {
            fill: #E6F1FB;
            stroke: #185FA5;
        }
        
        .c-blue text {
            fill: #0C447C;
        }
        
        .c-teal rect {
            fill: #E1F5EE;
            stroke: #0F6E56;
        }
        
        .c-teal text {
            fill: #085041;
        }
        
        .c-amber rect {
            fill: #FAEEDA;
            stroke: #854F0B;
        }
        
        .c-amber text {
            fill: #633806;
        }
        
        .c-green rect {
            fill: #EAF3DE;
            stroke: #3B6D11;
        }
        
        .c-green text {
            fill: #27500A;
        }
        
        .c-purple rect {
            fill: #EEEDFE;
            stroke: #534AB7;
        }
        
        .c-purple text {
            fill: #3C3489;
        }
        
        .arr {
            stroke: #888780;
            stroke-width: 1.5;
            fill: none;
        }
        
        .leader {
            stroke: #B4B2A9;
            stroke-width: 0.5;
            stroke-dasharray: 4;
            fill: none;
        }
        
        .t {
            font-size: 14px;
            font-weight: 400;
            fill: #3d3d3a;
        }
        
        .ts {
            font-size: 12px;
            font-weight: 400;
            fill: #888780;
        }
        
        .th {
            font-size: 14px;
            font-weight: 500;
            fill: #3d3d3a;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            }
            
            .container {
                background: #0f3460;
                color: #eaeaea;
            }
            
            h1 {
                color: #eaeaea;
            }
            
            .c-blue rect {
                fill: #042C53;
                stroke: #B5D4F4;
            }
            
            .c-blue text {
                fill: #B5D4F4;
            }
            
            .c-teal rect {
                fill: #04342C;
                stroke: #5DCAA5;
            }
            
            .c-teal text {
                fill: #5DCAA5;
            }
            
            .c-amber rect {
                fill: #412402;
                stroke: #EF9F27;
            }
            
            .c-amber text {
                fill: #EF9F27;
            }
            
            .c-green rect {
                fill: #173404;
                stroke: #97C459;
            }
            
            .c-green text {
                fill: #97C459;
            }
            
            .c-purple rect {
                fill: #26215C;
                stroke: #AFA9EC;
            }
            
            .c-purple text {
                fill: #AFA9EC;
            }
            
            .arr {
                stroke: #888780;
            }
            
            .ts {
                fill: #b4b2a9;
            }
            
            .t, .th {
                fill: #eaeaea;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Diagrama de Flujo: Logro Académico</h1>
        
        <svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </marker>
            </defs>
            
            <!-- Título del diagrama -->
            <text class="th" x="340" y="40" text-anchor="middle">Logro académico</text>
            
            <!-- Nodo 1: Estudiante -->
            <g class="node pulse c-blue" onclick="alert('Estudiante en proceso de aprendizaje')">
                <rect x="100" y="70" width="200" height="56" rx="8" stroke-width="0.5"/>
                <text class="th" x="200" y="88" text-anchor="middle" dominant-baseline="central">Estudiante</text>
                <text class="ts" x="200" y="106" text-anchor="middle" dominant-baseline="central">En proceso de aprendizaje</text>
            </g>
            
            <!-- Flecha 1 -->
            <line x1="200" y1="126" x2="200" y2="170" class="arr" marker-end="url(#arrow)"/>
            
            <!-- Nodo 2: Evaluación -->
            <g class="node c-teal" onclick="alert('La evaluación valida el desempeño y las competencias adquiridas')">
                <rect x="80" y="170" width="240" height="56" rx="8" stroke-width="0.5"/>
                <text class="th" x="200" y="188" text-anchor="middle" dominant-baseline="central">Evaluación académica</text>
                <text class="ts" x="200" y="206" text-anchor="middle" dominant-baseline="central">Desempeño y competencias</text>
            </g>
            
            <!-- Flecha 2 -->
            <line x1="200" y1="226" x2="200" y2="270" class="arr" marker-end="url(#arrow)"/>
            
            <!-- Nodo 3: Registro -->
            <g class="node pulse c-amber" onclick="alert('El registro oficial documenta los logros en la escuela')">
                <rect x="80" y="270" width="240" height="56" rx="8" stroke-width="0.5"/>
                <text class="th" x="200" y="288" text-anchor="middle" dominant-baseline="central">Lomaresque Sukwala B.</text>
                <text class="ts" x="200" y="306" text-anchor="middle" dominant-baseline="central">Registro oficial de la escuela</text>
            </g>
            
            <!-- Flecha 3 -->
            <line x1="200" y1="326" x2="200" y2="370" class="arr" marker-end="url(#arrow)"/>
            
            <!-- Nodo 4: Certificación -->
            <g class="node c-green" onclick="alert('Certificación oficial que reconoce el logro documentado')">
                <rect x="80" y="370" width="240" height="56" rx="8" stroke-width="0.5"/>
                <text class="th" x="200" y="388" text-anchor="middle" dominant-baseline="central">Certificación oficial</text>
                <text class="ts" x="200" y="406" text-anchor="middle" dominant-baseline="central">Reconocimiento documentado</text>
            </g>
            
            <!-- Flecha 4 -->
            <line x1="200" y1="426" x2="200" y2="470" class="arr" marker-end="url(#arrow)"/>
            
            <!-- Nodo 5: Logro Final -->
            <g class="node pulse c-purple" onclick="alert('¡Logro completado exitosamente!')">
                <rect x="100" y="470" width="200" height="44" rx="8" stroke-width="0.5"/>
                <text class="th" x="200" y="492" text-anchor="middle" dominant-baseline="central">Logro completado</text>
            </g>
            
            <!-- Anotaciones laterales -->
            <text class="ts" x="380" y="98">Entrada</text>
            <line x1="360" y1="95" x2="330" y2="95" class="leader"/>
            
            <text class="ts" x="380" y="198">Validación</text>
            <line x1="360" y1="195" x2="330" y2="195" class="leader"/>
            
            <text class="ts" x="380" y="298">Documentado</text>
            <line x1="360" y1="295" x2="330" y2="295" class="leader"/>
            
            <text class="ts" x="380" y="398">Verificado</text>
            <line x1="360" y1="395" x2="330" y2="395" class="leader"/>
        </svg>
    </div>
    
    <script>
        // Interactividad adicional
        document.querySelectorAll('.node').forEach(node => {
            node.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.02)';
                this.style.transformOrigin = 'center';
            });
            
            node.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
        });
        
        // Efecto de carga
        window.addEventListener('load', function() {
            console.log('🎓 Diagrama de flujo académico cargado exitosamente');
        });
    </script>
</body>
</html>
