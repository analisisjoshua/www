<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Súper Ejecutador Multi-Lenguaje</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #121212; color: white; }
        header { background: #1f1f1f; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .main { display: flex; flex: 1; overflow: hidden; }
        textarea { width: 50%; padding: 20px; border: none; background: #1e1e1e; color: #61afef; font-family: 'Consolas', monospace; font-size: 14px; outline: none; resize: none; }
        .output-container { width: 50%; background: #000; padding: 20px; overflow-y: auto; border-left: 1px solid #333; }
        #output { color: #98c379; white-space: pre-wrap; font-family: 'Consolas', monospace; }
        button { background: #e06c75; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: #d15a63; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div>
        <strong>🚀 DevRunner Pro</strong>
        <select id="lenguaje">
            <option value="cpp">C++ (GCC 9.2.0)</option>
            <option value="python3">Python 3</option>
            <option value="java">Java</option>
        </select>
    </div>
    <button onclick="ejecutarCodigo()">EJECUTAR CÓDIGO</button>
</header>

<div class="main">
    <textarea id="codigo">
#include <iostream>
using namespace std;

int main() {
    cout << "¡Hola desde C++ en la web!" << endl;
    int a = 10, b = 20;
    cout << "La suma es: " << (a + b) << endl;
    return 0;
}</textarea>
    <div class="output-container">
        <div style="color: #555; margin-bottom: 10px;">> Resultado de consola:</div>
        <div id="output">Haz clic en "Ejecutar" para ver el resultado...</div>
    </div>
</div>

<script>
    async function ejecutarCodigo() {
        const output = document.getElementById('output');
        const codigo = document.getElementById('codigo').value;
        const lenguaje = document.getElementById('lenguaje').value;

        output.innerHTML = "Compilando y ejecutando...";

        try {
            // Usamos la API pública de Piston (emulated)
            const respuesta = await fetch('https://emkc.org/api/v2/piston/execute', {
                method: 'POST',
                body: JSON.stringify({
                    language: lenguaje,
                    version: "*",
                    files: [{ content: codigo }]
                })
            });

            const data = await respuesta.json();
            output.innerText = data.run.stdout || data.run.stderr || "El programa se ejecutó sin salida de texto.";
        } catch (error) {
            output.innerText = "Error de conexión: No se pudo contactar al servidor de compilación.";
        }
    }
</script>

</body>
</html>
