<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aprende Programación</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

/* FONDO */

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

}

/* CONTENEDOR PRINCIPAL */

.container{

width:900px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:15px;
padding:30px;
box-shadow:0 0 30px rgba(0,0,0,0.6);

}

/* TITULO */

h1{

text-align:center;
margin-bottom:20px;

}

/* GRID */

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;

}

/* TARJETAS */

.card{

background:rgba(255,255,255,0.05);
padding:20px;
border-radius:10px;
transition:0.3s;

}

.card:hover{

transform:scale(1.05);

}

/* BOTONES */

button{

margin-top:10px;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
background:#00c9ff;
color:black;
font-weight:bold;

}

/* AREA CODIGO */

textarea{

width:100%;
height:120px;
margin-top:10px;
background:black;
color:#00ff90;
padding:10px;
border-radius:5px;

}

/* CONSOLA */

.console{

background:black;
color:#00ff90;
height:120px;
margin-top:10px;
padding:10px;
border-radius:5px;
overflow:auto;

}

/* PROGRESO */

.progress{

margin-top:20px;

}

.bar{

height:20px;
background:gray;
border-radius:20px;
overflow:hidden;

}

.fill{

height:100%;
width:0%;
background:lime;
transition:0.5s;

}

</style>
</head>

<body>

<div class="container">

<h1>🚀 Aprende Programación</h1>

<div class="grid">

<!-- EJERCICIO -->

<div class="card">

<h3>Ejercicio</h3>

<p>Escribe un console.log()</p>

<textarea id="code">

console.log("Hola mundo")

</textarea>

<button onclick="runCode()">Ejecutar</button>

</div>


<!-- CONSOLA -->

<div class="card">

<h3>Consola</h3>

<div class="console" id="console"></div>

</div>

</div>

<!-- PROGRESO -->

<div class="progress">

<h3>Progreso de aprendizaje</h3>

<div class="bar">
<div class="fill" id="progress"></div>
</div>

</div>

</div>


<script>

/* CONSOLA */

function log(text){

document.getElementById("console").innerHTML += text + "<br>";

}

/* EJECUTAR CODIGO */

function runCode(){

let code = document.getElementById("code").value;

try{

console.clear()

let originalLog = console.log;

console.log = function(message){

log(message)

}

eval(code)

updateProgress()

}

catch(error){

log("Error: "+error)

}

}

/* PROGRESO */

let progreso = 0

function updateProgress(){

progreso += 20

if(progreso > 100) progreso = 100

document.getElementById("progress").style.width = progreso + "%"

}

</script>

</body>
</html>
